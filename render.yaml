# Render Blueprint — set secrets in the dashboard (DATABASE_URL, NEXTAUTH_SECRET, etc.).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: contractual-v2-prod
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build && npx tsc src/server.ts --outDir dist --esModuleInterop --skipLibCheck --target es6 --module commonjs
    startCommand: node dist/server.js
    healthCheckPath: /api/gigs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
      - key: DATABASE_URL
        sync: false
