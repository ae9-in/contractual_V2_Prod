# Render Blueprint — set secrets in the dashboard (DATABASE_URL, NEXTAUTH_SECRET, etc.).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: contractual-v2-prod
    runtime: node
    buildCommand: npm install && cd backend && npx prisma generate && cd ../frontend && npm run build
    preDeployCommand: cd backend && npx prisma db push --accept-data-loss
    startCommand: cd frontend && node --import tsx src/server.ts
    healthCheckPath: /api/gigs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
      - key: DATABASE_URL
        sync: false
